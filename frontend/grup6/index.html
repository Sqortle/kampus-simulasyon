<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Grup 6 | Kampüs Atık Zekası</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
</head>
<body class="bg-slate-50 text-slate-800 font-sans h-screen flex overflow-hidden">

    <aside class="w-80 bg-white shadow-xl flex flex-col z-10 overflow-y-auto shrink-0">
        <div class="p-6 bg-indigo-600 text-white relative">
            
            <a href="/" class="inline-flex items-center gap-2 text-indigo-200 hover:text-white text-sm mb-4 transition-colors font-medium">
                <i class="fa-solid fa-arrow-left"></i> Ana Sayfaya Dön
            </a>
            
            <h1 class="text-xl font-bold flex items-center gap-2">
                <i class="fa-solid fa-satellite-dish"></i> Atık Zekası
            </h1>
            <p class="text-indigo-200 text-sm mt-1">Grup 6 Yönetim Paneli</p>
        </div>

        <div class="p-6 border-b border-slate-100">
            <h2 class="text-sm font-bold text-slate-400 uppercase tracking-wider mb-4">Sistem Kontrolü</h2>
            <button id="btn-init-sim" class="w-full bg-indigo-50 text-indigo-700 hover:bg-indigo-100 font-semibold py-2 px-4 rounded-lg transition mb-3 border border-indigo-200">
                <i class="fa-solid fa-microchip mr-2"></i> Yeni Veri Üret
            </button>
            <div class="flex items-center gap-2 bg-slate-100 p-3 rounded-lg">
                <button id="btn-toggle-play" class="bg-indigo-600 text-white w-10 h-10 rounded-full hover:bg-indigo-700 flex items-center justify-center shrink-0">
                    <i class="fa-solid fa-play"></i>
                </button>
                <div class="flex-1">
                    <div class="text-xs text-slate-500 font-medium flex justify-between">
                        <span>Zaman: <span id="clock-display" class="text-indigo-700 font-bold">08:00</span></span>
                    </div>
                    <input type="range" id="time-slider" min="0" max="100" value="0" class="w-full mt-1 accent-indigo-600">
                </div>
            </div>
        </div>

        <div class="p-6 border-b border-slate-100">
            <h2 class="text-sm font-bold text-slate-400 uppercase tracking-wider mb-4">Akıllı Lojistik</h2>
            <div class="flex gap-2 mb-3">
                <select id="route-material" class="border rounded-lg p-2 text-sm flex-1 outline-none focus:border-indigo-500">
                    <option value="all">Genel Doluluk</option>
                    <option value="plastic">Plastik Odaklı</option>
                    <option value="glass">Cam Odaklı</option>
                </select>
                <button id="btn-calc-route" class="bg-emerald-500 hover:bg-emerald-600 text-white px-4 rounded-lg transition">
                    <i class="fa-solid fa-route"></i> Çiz
                </button>
            </div>
            <div id="route-results" class="hidden bg-emerald-50 text-emerald-800 p-3 rounded-lg text-sm">
                </div>
        </div>

        <div class="p-6">
            <h2 class="text-sm font-bold text-slate-400 uppercase tracking-wider mb-4">Görüntü Analizi (AI)</h2>
            <div id="ai-dropzone" class="border-2 border-dashed border-slate-300 rounded-xl p-4 text-center cursor-pointer hover:bg-slate-50 hover:border-indigo-400 transition">
                <i class="fa-solid fa-cloud-arrow-up text-2xl text-slate-400 mb-2"></i>
                <p class="text-xs text-slate-500">Fotoğraf yükle veya sürükle</p>
                <input type="file" id="ai-file" class="hidden" accept="image/*">
            </div>
            <div id="ai-result" class="mt-3 text-sm hidden font-medium"></div>
        </div>
    </aside>

    <main class="flex-1 flex flex-col h-screen overflow-y-auto">
        
        <header class="bg-white border-b border-slate-200 p-6 flex justify-between items-center shrink-0">
            <div class="flex gap-8">
                <div>
                    <p class="text-xs text-slate-400 font-bold uppercase">Sistemdeki Kutu</p>
                    <p class="text-2xl font-black text-slate-700" id="stat-count">-</p>
                </div>
                <div>
                    <p class="text-xs text-slate-400 font-bold uppercase">Genel Doluluk</p>
                    <p class="text-2xl font-black text-slate-700" id="stat-avg">%0</p>
                </div>
            </div>
        </header>

        <div class="p-6 flex-1">
            <h3 class="text-lg font-bold text-slate-700 mb-4">Sensör İstasyonları</h3>
            <div id="station-grid" class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 xl:grid-cols-4 gap-4">
                <p class="text-slate-400 col-span-full">Veri üretimi bekleniyor...</p>
            </div>
        </div>
    </main>

    <div id="chart-modal" class="fixed inset-0 bg-slate-900/50 hidden flex items-center justify-center z-50">
        <div class="bg-white rounded-xl shadow-2xl p-6 w-full max-w-2xl relative">
            <button id="close-modal" class="absolute top-4 right-4 text-slate-400 hover:text-slate-700">
                <i class="fa-solid fa-xmark text-xl"></i>
            </button>
            <h3 id="modal-title" class="text-lg font-bold text-slate-800 mb-4">İstasyon Analizi</h3>
            <canvas id="history-chart" height="100"></canvas>
        </div>
    </div>

    <script src="app.js"></script>
</body>
</html>
